
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code</title>
    <style>
        /* Центрирование всего контента */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #A9A9A9;
            font-family: Arial, sans-serif;
        }

        /* Контейнер для текста и QR */
        .card {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0 0 20px 0;
            color: #333;
            font-size: 24px;
        }

        p {
            margin: 20px 0 0 0;
            color: #666;
            font-size: 18px;
        }

        .qr-code {
            max-width: 250px; /* Размер QR-кода */
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="1000b2415a299.svg" alt="QR-код для оплаты" class="qr-code">
        <p>SCAN ME</p>
    </div>

</body>
</html>
